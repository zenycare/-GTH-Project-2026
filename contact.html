<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">
  <div class="container">
    
    <!-- Logo -->
    <a class="navbar-brand fw-bold" href="hero.html">🌱 Green Tech</a>

    <!-- Nút menu mobile -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menu -->
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">

        <li class="nav-item">
          <a class="nav-link" href="hero.html">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="solutions.html">Solutions</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="contact.html">Contact</a>
        </li>

      </ul>
    </div>

  </div>
</nav>
<div class="container py-5">
    <h2 class="text-center mb-4">Contact Us</h2>

    <form id="contactForm" class="w-50 mx-auto">

        <div class="mb-3">
            <input type="text" id="name" class="form-control" placeholder="Your Name">
        </div>

        <div class="mb-3">
            <input type="email" id="email" class="form-control" placeholder="Your Email">
        </div>

        <div class="mb-3">
            <textarea id="message" class="form-control" placeholder="Message"></textarea>
        </div>

        <button class="btn btn-success w-100">Send</button>
    </form>

    <p id="msg" class="text-center mt-3"></p>
</div>

<script src="js/main.js"></script>

</body>
</html>
